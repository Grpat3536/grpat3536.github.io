name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A75F3B: ${{ secrets.A75F3B }}
          B23E96: ${{ secrets.B23E96 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A75F3B', '')
          sec_b = os.environ.get('B23E96', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 677bed54a8ba573fc0fa0fd1b10fab878c -->', sec_a)
          if sec_b:
              after = after.replace('<!--  -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
